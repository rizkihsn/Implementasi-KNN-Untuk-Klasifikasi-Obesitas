<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Prediksi Tingkat Obesitas</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css" rel="stylesheet">
</head>
<body>

<!-- Navbar -->
<nav class="navbar navbar-expand-lg">
    <div class="container">
        <a class="navbar-brand fw-bold" href="/">
            <i class="bi bi-heart-pulse-fill me-2"></i>KNN Obesitas
        </a>
        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
            <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="navbarNav">
            <ul class="navbar-nav ms-auto">
                <li class="nav-item"><a class="nav-link active" href="/">Prediksi Manual</a></li>
                <li class="nav-item"><a class="nav-link" href="/upload">Upload CSV</a></li>
                <li class="nav-item"><a class="nav-link" href="/metrics">Metrik Model</a></li>
            </ul>
        </div>
    </div>
</nav>

<div class="container mt-5 mb-5">
    <div class="card shadow p-5">
        <h1 class="text-center mb-2">
            <i class="bi bi-clipboard2-pulse-fill text-primary me-2 animate-breeze"></i>Prediksi Tingkat Obesitas
        </h1>
        <p class="text-center text-muted mb-5">
            Sistem Klasifikasi Tingkat Obesitas Menggunakan Algoritma KNN
        </p>

        <form action="/predict" method="POST">
            <div class="row">

                <!-- Gender -->
                <div class="col-md-6 mb-3">
                    <label>Gender</label>
                    <select name="gender" class="form-control" required>
                        <option value="">Pilih Gender</option>
                        <option value="Male">Male</option>
                        <option value="Female">Female</option>
                    </select>
                </div>

                <!-- Age -->
                <div class="col-md-6 mb-3">
                    <label>Age</label>
                    <input type="number" step="any" name="age" class="form-control" placeholder="Masukkan umur" required>
                </div>

                <!-- Height -->
                <div class="col-md-6 mb-3">
                    <label>Height (Meter)</label>
                    <input type="number" step="any" name="height" class="form-control" placeholder="Contoh: 1.70" required>
                </div>

                <!-- Weight -->
                <div class="col-md-6 mb-3">
                    <label>Weight (Kg)</label>
                    <input type="number" step="any" name="weight" class="form-control" placeholder="Contoh: 65" required>
                </div>

                <!-- FCVC -->
                <div class="col-md-6 mb-3">
                    <label>FCVC (Konsumsi Sayur)</label>
                    <input type="number" step="any" name="fcvc" class="form-control" placeholder="1 - 3" required>
                </div>

                <!-- NCP -->
                <div class="col-md-6 mb-3">
                    <label>NCP (Frekuensi Makan)</label>
                    <input type="number" step="any" name="ncp" class="form-control" placeholder="1 - 4" required>
                </div>

                <!-- CH2O -->
                <div class="col-md-6 mb-3">
                    <label>CH2O (Konsumsi Air)</label>
                    <input type="number" step="any" name="ch2o" class="form-control" placeholder="1 - 3 Liter" required>
                </div>

                <!-- FAF -->
                <div class="col-md-6 mb-3">
                    <label>FAF (Aktivitas Fisik)</label>
                    <input type="number" step="any" name="faf" class="form-control" placeholder="0 - 3" required>
                </div>

                <!-- TUE -->
                <div class="col-md-6 mb-3">
                    <label>TUE (Waktu Gadget)</label>
                    <input type="number" step="any" name="tue" class="form-control" placeholder="0 - 2" required>
                </div>

                <!-- CALC -->
                <div class="col-md-6 mb-3">
                    <label>Konsumsi Alkohol (CALC)</label>
                    <select name="calc" class="form-control" required>
                        <option value="">Pilih</option>
                        <option value="no">no</option>
                        <option value="Sometimes">Sometimes</option>
                        <option value="Frequently">Frequently</option>
                        <option value="Always">Always</option>
                    </select>
                </div>

                <!-- FAVC -->
                <div class="col-md-6 mb-3">
                    <label>Sering Makan Fast Food? (FAVC)</label>
                    <select name="favc" class="form-control" required>
                        <option value="">Pilih</option>
                        <option value="yes">yes</option>
                        <option value="no">no</option>
                    </select>
                </div>

                <!-- SCC -->
                <div class="col-md-6 mb-3">
                    <label>Monitoring Kalori? (SCC)</label>
                    <select name="scc" class="form-control" required>
                        <option value="">Pilih</option>
                        <option value="yes">yes</option>
                        <option value="no">no</option>
                    </select>
                </div>

                <!-- SMOKE -->
                <div class="col-md-6 mb-3">
                    <label>Merokok? (SMOKE)</label>
                    <select name="smoke" class="form-control" required>
                        <option value="">Pilih</option>
                        <option value="yes">yes</option>
                        <option value="no">no</option>
                    </select>
                </div>

                <!-- FAMILY -->
                <div class="col-md-6 mb-3">
                    <label>Riwayat Obesitas Keluarga</label>
                    <select name="family" class="form-control" required>
                        <option value="">Pilih</option>
                        <option value="yes">yes</option>
                        <option value="no">no</option>
                    </select>
                </div>

                <!-- CAEC -->
                <div class="col-md-6 mb-3">
                    <label>Kebiasaan Cemilan (CAEC)</label>
                    <select name="caec" class="form-control" required>
                        <option value="">Pilih</option>
                        <option value="Sometimes">Sometimes</option>
                        <option value="Frequently">Frequently</option>
                        <option value="Always">Always</option>
                        <option value="no">no</option>
                    </select>
                </div>

                <!-- Transport -->
                <div class="col-md-6 mb-3">
                    <label>Transportasi</label>
                    <select name="mtrans" class="form-control" required>
                        <option value="">Pilih Transportasi</option>
                        <option value="Public_Transportation">Public_Transportation</option>
                        <option value="Walking">Walking</option>
                        <option value="Automobile">Automobile</option>
                        <option value="Motorbike">Motorbike</option>
                        <option value="Bike">Bike</option>
                    </select>
                </div>

            </div>

            <button type="submit" class="btn btn-primary w-100 mt-4">
                <i class="bi bi-cpu me-2"></i>Prediksi Tingkat Obesitas
            </button>
        </form>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
